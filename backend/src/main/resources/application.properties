# Spring Boot Configuration
spring.application.name=platform
server.port=8080

# Database Configuration
# Default is H2 in-memory for local development.
# To use MySQL, activate the mysql profile: --spring.profiles.active=mysql
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/interview_platform
spring.datasource.username=root
spring.datasource.password=chetan@7020
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging
logging.level.root=INFO
logging.level.com.interview.platform=DEBUG
logging.level.org.springframework.web=DEBUG

# JWT Configuration
jwt.secret=your_jwt_secret_key_change_this_in_production_environment_with_strong_key
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# File Upload Configuration
file.upload-dir=uploads/resumes
file.max-size=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

